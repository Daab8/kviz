<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simulátor gamepadu</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; margin: 16px; color:#102027 }
      .wrap { max-width:520px; margin:0 auto }
      .controls { display:flex; gap:12px; align-items:center; margin-bottom:12px }
      .display { width:260px; height:80px; border-radius:8px; background:#000; color:#0ff; font-weight:700; font-size:48px; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 14px rgba(0,0,0,0.12); }
      .led { width:28px; height:28px; border-radius:50%; background:#222; box-shadow:0 2px 6px rgba(0,0,0,0.2); }
      .buttons { display:flex; gap:18px; margin-top:16px; align-items:flex-start }
      .col { display:flex; flex-direction:column; gap:12px }
      .col.right { align-items:center }
      .col.left { align-items:flex-start }
      button.big { width:72px; height:48px; border-radius:8px; border:1px solid rgba(0,0,0,0.12); font-weight:700; cursor:pointer }
      button.yellow { background:#ffd54f } button.blue { background:#4fc3f7 } button.red { background:#ff8a80 } button.black { background:#111; color:#fff } button.white { background:#fff }
      .meta { margin-bottom:8px; color:#546e7a }
      .status { margin-left:8px; font-weight:700 }
      .small { font-size:0.92rem }
      pre#log { max-width:360px; }
      @media (max-width:480px) {
        .wrap { padding:12px }
        .display { width:160px; height:64px; font-size:40px }
        .buttons { flex-direction:row; gap:12px; justify-content:flex-start; align-items:flex-start }
        .col.left { order: 0; width:64px; margin-right:8px; }
        .col.right { order: 1; display:flex; flex-direction:column; gap:10px; flex:1; align-items:stretch }
        .col.left button.big { width:100%; height:56px; }
        .col.right button.big { width:100%; height:56px; font-size:1rem }
        .controls { flex-wrap:wrap }
      }
      .row { display:flex; gap:8px; align-items:center }
      input[type=text] { padding:6px 8px; border-radius:6px; border:1px solid #cfd8dc }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="controls">
        <div style="display:flex;flex-direction:column">
          <div><strong>ID:</strong> <span id="gpId">-</span></div>
          <div><strong>Status:</strong> <span class="status" id="status">disconnected</span></div>
        </div>
      </div>

      <div class="row">
        <div class="display" id="sevenSeg">--</div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:12px;margin-left:12px">
          <div class="led" id="led"></div>
          <div class="small">LED</div>
        </div>
      </div>

      <div class="buttons">
        <div class="col left">
          <button id="btnR" class="big white">R</button>
        </div>
        <div class="col right">
          <button id="btnA" class="big yellow">A</button>
          <button id="btnB" class="big blue">B</button>
          <button id="btnC" class="big red">C</button>
          <button id="btnD" class="big black">D</button>
        </div>
      </div>

      <div style="margin-top:12px;font-size:0.9rem;color:#546e7a">
        <div><strong>Log</strong></div>
        <pre id="log" style="height:120px;overflow:auto;background:#f8fafc;border:1px solid #e2e8f0;padding:8px;border-radius:6px;margin-top:6px"></pre>
      </div>

      <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
      <script>
        const WS_PATH = '/mqtt';
        const statusEl = document.getElementById('status');
        const gpIdEl = document.getElementById('gpId');
        const logEl = document.getElementById('log');
        const sevenSeg = document.getElementById('sevenSeg');
        const led = document.getElementById('led');

        let client = null;
        let gpId = null;
        let currentPhase = 'idle';
        let currentQuestion = null;
        let selection = [];
        let telemetryTimer = null;
        let reconnectTimer = null;

        function randId() { return 'g-' + Math.random().toString(36).slice(2,9); }

        function getOrCreateId() {
          try {
            const k = 'simGamepadId';
            let id = localStorage.getItem(k);
            if (!id) {
              id = randId();
              localStorage.setItem(k, id);
            }
            return id;
          } catch (e) { return randId(); }
        }

        function setStatus(s) { try { statusEl.textContent = s; } catch (e) {} }
        function setLedColor(r,g,b) { try { led.style.background = `rgb(${r},${g},${b})`; } catch (e) {} }
        function setDisplay(text) { try { sevenSeg.textContent = String(text).padStart(2,' '); } catch (e) {} }

        function connect() {
          if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
          if (client) try { client.end(true); } catch (e) {}

          gpId = getOrCreateId();
          setStatus('connecting…');
          const url = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + WS_PATH;
          try {
            client = mqtt.connect(url, { clientId: gpId, clean: true, reconnectPeriod: 0 });
          } catch (e) { setStatus('connect-failed'); scheduleReconnect(); return; }

          client.on('connect', () => {
            setStatus('connected');
            try { gpIdEl.textContent = gpId; } catch(e) {}
            try { client.subscribe(`gamepad/${gpId}/control`, { qos: 1 }); } catch (e) {}
            try { client.subscribe(`gamepad/${gpId}/result`, { qos: 1 }); } catch (e) {}
            try { publishTelemetry(); } catch (e) {}
            telemetryTimer = setInterval(publishTelemetry, 5000);
          });

          client.on('message', (topic, msg) => {
            try {
              const payload = JSON.parse(msg.toString());
              const parts = topic.split('/');
              const kind = parts[2];
              if (kind === 'control') handleControl(payload);
              if (kind === 'result') handleResult(payload);
            } catch (e) {}
          });

          client.on('error', (err) => { setStatus('error'); });

          client.on('close', () => {
            setStatus('disconnected');
            if (telemetryTimer) { clearInterval(telemetryTimer); telemetryTimer = null; }
            scheduleReconnect();
          });
        }

        function scheduleReconnect() {
          if (reconnectTimer) return;
          reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, 1500);
        }

        function publishTelemetry() {
          if (!client || !gpId || !client.connected) return;
          const rssi = -40 - Math.floor(Math.random() * 30);
          try { client.publish(`gamepad/${gpId}/telemetry`, JSON.stringify({ rssiDbm: rssi }), { qos:0 }); } catch (e) {}
        }

        function appendLog(txt) { try { logEl.textContent = (logEl.textContent + '\n' + txt).slice(-8000); logEl.scrollTop = logEl.scrollHeight; } catch(e) {} }

        function publishChoice(button) {
          if (!client || !gpId || !client.connected) { appendLog('publishChoice blocked: not connected'); return; }
          const payload = { button, selection };
          try { client.publish(`gamepad/${gpId}/choice`, JSON.stringify(payload), { qos:1 }); appendLog('OUT ▶ choice ' + JSON.stringify(payload)); } catch (e) { appendLog('OUT ERROR ' + e.message); }
        }

        function publishSubmit() {
          if (!client || !gpId || !client.connected) { appendLog('publishSubmit blocked: not connected'); return; }
          try { client.publish(`gamepad/${gpId}/submit`, JSON.stringify({ selection }), { qos:1 }); appendLog('OUT ▶ submit ' + JSON.stringify({ selection })); } catch (e) { appendLog('OUT ERROR ' + e.message); }
        }

        function handleControl(payload) {
          const type = (payload && payload.type) ? String(payload.type).toLowerCase() : '';
          if (type === 'phase') {
            currentPhase = String(payload.phase || 'idle');
            if (payload.question && payload.question.id) {
              currentQuestion = payload.question;
            } else { currentQuestion = null; }
            if (currentPhase === 'question') { selection = []; renderSelectionDisplay(); }
          }
          if (type === 'submit-request') { publishSubmit(); }
          if (type === 'identify-display') {
            // Respect the admin `enabled` flag: when disabled, clear the identify
            // display (unless voting) so simulator matches hardware behaviour.
            const enabled = Boolean(payload.enabled);
            if (enabled) {
              if (payload.identifyNumber != null) setDisplay(Number(payload.identifyNumber));
            } else {
              if (currentPhase !== 'voting') setDisplay('--');
            }
          }
        }

        function handleResult(payload) { if (!payload) return; if (payload.correct) setLedColor(0,200,0); else setLedColor(200,0,0); setDisplay(Number(payload.totalPoints || 0)); }

        function hasVote() { return Array.isArray(selection) && selection.length > 0; }
        function renderSelectionDisplay() { if (!hasVote()) { setDisplay('--'); setLedColor(0,0,0); return; } setDisplay(selection.join('')); if (currentPhase === 'voting') setLedColor(0,0,200); }

        // button wiring
        document.getElementById('btnA').addEventListener('click', () => { applyButton('A'); });
        document.getElementById('btnB').addEventListener('click', () => { applyButton('B'); });
        document.getElementById('btnC').addEventListener('click', () => { applyButton('C'); });
        document.getElementById('btnD').addEventListener('click', () => { applyButton('D'); });
        document.getElementById('btnR').addEventListener('click', () => { applyButton('R'); });

        function applyButton(button) {
          if (currentPhase !== 'voting') { if (button === 'R') { publishChoice('R'); } else publishChoice(button); return; }
          if (button === 'R') { if (hasVote()) { selection = []; renderSelectionDisplay(); publishChoice('R'); } return; }
          if (!['A','B','C','D'].includes(button)) return;
          const type = currentQuestion && currentQuestion.answerType ? currentQuestion.answerType : 'single';
          if (type === 'single') { if (hasVote()) return; selection = [button]; }
          else if (type === 'multiple') { if (selection.includes(button)) selection = selection.filter(x => x !== button); else selection = [...selection, button].sort(); }
          else { if (selection.includes(button)) return; if (selection.length >= 4) return; selection = [...selection, button]; }
          renderSelectionDisplay(); publishChoice(button);
        }

        // start automatically
        try { connect(); } catch (e) { scheduleReconnect(); }
      </script>
    </div>
  </body>
</html>
