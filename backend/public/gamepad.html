<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simulátor gamepadu</title>
    <style>
      * { box-sizing: border-box }
      body { font-family: Arial, Helvetica, sans-serif; margin:0; padding:12px; color:#102027 }
      :root { --display-h-base: clamp(48px, 10vh, 72px); }
      .wrap { width:100%; max-width:520px; margin:0 auto; display:flex; flex-direction:column; align-items:center; height:100vh; justify-content:flex-start; overflow:auto; overflow-x:hidden }
      /* visual scale wrapper: desktop scaled to 200% (2.0). Mobile overrides below. */
      .scale { transform: scale(2); transform-origin: top center; display:flex; flex-direction:column; align-items:center; width:100%; max-width:520px; margin-top:8px; transition:transform 120ms ease }
      .controls { display:flex; gap:12px; align-items:center; margin-bottom:12px }
      /* align row to match buttons width and place display at left, LED at right */
      .row { display:flex; gap:12px; align-items:center; justify-content:center; width:100%; max-width:420px; padding:0 12px; overflow:visible }
      /* compact display: narrow so scaled UI fits mobile screens
        desktop uses 75% of the base height to reduce vertical size */
      .display { width: clamp(96px, 20vw, 140px); height: calc(var(--display-h-base) * 0.8); border-radius:8px; background:#000; color:#0ff; font-weight:700; font-size: clamp(18px, 4.5vw, 44px); display:flex; align-items:center; justify-content:center; box-shadow:0 6px 14px rgba(0,0,0,0.12); }
      .led { width:28px; height:28px; border-radius:50%; background:#222; box-shadow:0 2px 6px rgba(0,0,0,0.2); }
      .led-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; margin-left:12px; height:100%; flex:0 0 auto }
      .buttons { display:flex; gap:18px; margin-top:12px; align-items:flex-start; justify-content:center; width:100% }
      .col { display:flex; flex-direction:column; gap:12px }
      .col.right { align-items:center }
      .col.left { align-items:flex-start }
      button.big { width:72px; height:48px; border-radius:8px; border:1px solid rgba(0,0,0,0.12); font-weight:700; cursor:pointer }
      button.yellow { background:#ffd54f } button.blue { background:#4fc3f7 } button.red { background:#ff8a80 } button.black { background:#111; color:#fff } button.white { background:#fff }
      .meta { margin-bottom:8px; color:#546e7a }
      .status { margin-left:8px; font-weight:700 }
      .small { font-size:0.92rem }
      pre#log { max-width:360px }
      @media (max-width:480px) {
        /* increase overall visual scale only for narrow/mobile viewports */
        .scale { transform: scale(1.6); }
        .wrap { padding:12px }
        .display { width: clamp(96px, 70vw, 140px); height:64px; font-size:36px }
        .buttons { width:96vw; flex-direction:row; gap:12px; justify-content:center }
        .col.left { order: 0; width:72px; margin-right:12px; display:flex; align-items:flex-start }
        .col.right { order: 1; display:flex; flex-direction:column; gap:12px; flex:0; align-items:flex-start }
        .col.left button.big { width:72px; height:48px }
        .col.right button.big { width:72px; height:48px; font-size:1rem }
        .controls { flex-wrap:wrap }
      }
      input[type=text] { padding:6px 8px; border-radius:6px; border:1px solid #cfd8dc }
    </style>
  </head>
  <body>
    <div class="wrap">
    <div class="scale">
    <!-- ID/status removed for compact UI -->

    <div class="row">
        <div class="display" id="sevenSeg">--</div>
        <div class="led-wrap">
          <div class="led" id="led"></div>
        </div>
      </div>

      <div class="buttons">
        <div class="col left">
          <button id="btnR" class="big white">R</button>
        </div>
        <div class="col right">
          <button id="btnA" class="big yellow">A</button>
          <button id="btnB" class="big blue">B</button>
          <button id="btnC" class="big red">C</button>
          <button id="btnD" class="big black">D</button>
        </div>
      </div>
      </div> <!-- /.scale -->

      <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
      <script>
        const WS_PATH = '/mqtt';
        const CTRL = {
          PHASE: 0x01,
          SUBMIT_REQUEST: 0x02,
          IDENTIFY_DISPLAY: 0x03,
          FINAL_STATS: 0x04,
          FW_UPDATE: 0x05,
        };
        const MSG = {
          RESULT: 0x10,
          TELEMETRY: 0x20,
          TELEMETRY_STATUS: 0x21,
          SUBMIT: 0x30,
          CHOICE: 0x31,
        };
        const ANSWER_TYPES = ['single', 'multiple', 'ordering'];
        const LETTER_TO_INDEX = { A: 0, B: 1, C: 2, D: 3 };
        const textEncoder = new TextEncoder();
        const textDecoder = new TextDecoder();
        const sevenSeg = document.getElementById('sevenSeg');
        const led = document.getElementById('led');

        let client = null;
        let gpId = null;
        let currentPhase = 'idle';
        let currentQuestion = null;
        let selection = [];
        let telemetryTimer = null;
        let reconnectTimer = null;
        let identifyDisplayEnabled = false;
        let identifyNumber = null;
        let startMs = null;
        let choiceMs = null;
        let endMs = null;

        function randId() { return 'g-' + Math.random().toString(36).slice(2,9); }

        function getOrCreateId() {
          try {
            const k = 'simGamepadId';
            let id = localStorage.getItem(k);
            if (!id) {
              id = randId();
              localStorage.setItem(k, id);
            }
            return id;
          } catch (e) { return randId(); }
        }

        function setLedColor(r,g,b) { try { led.style.background = `rgb(${r},${g},${b})`; } catch (e) {} }
        function setDisplay(text) { try { sevenSeg.textContent = String(text).padStart(2,' '); } catch (e) {} }

        function nowMs() {
          try {
            if (typeof performance !== 'undefined' && typeof performance.now === 'function') {
              return Math.floor(performance.now()) >>> 0;
            }
          } catch (e) {}
          return Date.now() >>> 0;
        }

        function clearTelemetryTimer() {
          if (telemetryTimer) {
            clearInterval(telemetryTimer);
            telemetryTimer = null;
          }
        }

        function normalizeBytes(payload) {
          if (payload instanceof Uint8Array) return payload;
          if (payload instanceof ArrayBuffer) return new Uint8Array(payload);
          if (payload && payload.buffer instanceof ArrayBuffer) {
            return new Uint8Array(payload.buffer, payload.byteOffset || 0, payload.byteLength || payload.length || 0);
          }
          if (Array.isArray(payload)) return Uint8Array.from(payload);
          if (typeof payload === 'string') return textEncoder.encode(payload);
          return new Uint8Array(0);
        }

        function readUInt16LE(bytes, offset) {
          return bytes[offset] | (bytes[offset + 1] << 8);
        }

        function pushUInt32LE(bytes, value) {
          bytes.push(value & 0xff);
          bytes.push((value >>> 8) & 0xff);
          bytes.push((value >>> 16) & 0xff);
          bytes.push((value >>> 24) & 0xff);
        }

        function bytesToHex(bytes) {
          return Array.from(bytes, (value) => value.toString(16).padStart(2, '0')).join('');
        }

        function encodeTelemetry(rssi, batteryPct) {
          const bytes = [MSG.TELEMETRY];
          let flags = 0;
          if (Number.isFinite(rssi)) flags |= 1;
          if (Number.isFinite(batteryPct)) flags |= 2;
          bytes.push(flags);

          if (flags & 1) {
            const signed = Math.max(-128, Math.min(127, Math.round(rssi)));
            bytes.push((signed + 256) & 0xff);
          }
          if (flags & 2) {
            bytes.push(Math.max(0, Math.min(100, Math.round(batteryPct))) & 0xff);
          }

          return Uint8Array.from(bytes);
        }

        function encodeTelemetryStatus(statusType, status, detail = '') {
          const subtype = statusType === 'fw-update-status' ? 1 : 0;
          const statusMap = { start: 1, ok: 2, error: 3 };
          const detailBytes = Array.from(textEncoder.encode(String(detail || '')).slice(0, 255));
          return Uint8Array.from([
            MSG.TELEMETRY_STATUS,
            subtype,
            statusMap[status] || 0,
            detailBytes.length,
            ...detailBytes,
          ]);
        }

        function encodeSubmitPayload(selectedLetters, timing, answerType) {
          const cleanSelection = Array.isArray(selectedLetters)
            ? selectedLetters.filter((letter) => Object.prototype.hasOwnProperty.call(LETTER_TO_INDEX, letter))
            : [];

          let flags = 0;
          if (answerType === 'ordering') {
            if (cleanSelection.length > 0) flags |= 2;
          } else if (cleanSelection.length > 0) {
            flags |= 1;
          }

          const hasTiming = Boolean(
            timing && ['startMs', 'choiceMs', 'endMs'].some((key) => timing[key] !== null && timing[key] !== undefined)
          );
          if (hasTiming) flags |= 4;

          const bytes = [MSG.SUBMIT, flags];

          if (flags & 1) {
            let mask = 0;
            for (const letter of cleanSelection) {
              mask |= 1 << LETTER_TO_INDEX[letter];
            }
            bytes.push(mask & 0xff);
          }

          if (flags & 2) {
            const ordered = cleanSelection.slice(0, 4);
            bytes.push(ordered.length & 0xff);
            for (const letter of ordered) {
              bytes.push(LETTER_TO_INDEX[letter] & 0xff);
            }
          }

          if (flags & 4) {
            for (const key of ['startMs', 'choiceMs', 'endMs']) {
              const rawValue = timing ? timing[key] : null;
              const encoded = Number.isFinite(Number(rawValue))
                ? (Math.floor(Number(rawValue)) >>> 0)
                : 0xFFFFFFFF;
              pushUInt32LE(bytes, encoded);
            }
          }

          return Uint8Array.from(bytes);
        }

        function decodeControlPayload(message) {
          const bytes = normalizeBytes(message);
          if (bytes.length < 1) return null;

          const type = bytes[0];
          if (type === CTRL.PHASE) {
            if (bytes.length < 3) return null;

            const phaseMap = {
              0: 'idle',
              1: 'welcome',
              2: 'question',
              3: 'voting',
              4: 'collecting',
              5: 'review',
              6: 'reveal',
              7: 'stats',
              8: 'finished',
            };

            const payload = {
              type: 'phase',
              phase: phaseMap[bytes[1]] || 'idle',
            };

            const flags = bytes[2];
            let offset = 3;

            if (flags & 1) {
              if (offset < bytes.length) {
                const answerType = ANSWER_TYPES[bytes[offset++]] || 'single';
                let questionId = null;
                let questionIdLength = 0;
                if (offset < bytes.length) {
                  questionIdLength = bytes[offset++];
                }
                if (questionIdLength > 0 && offset + questionIdLength <= bytes.length) {
                  questionId = textDecoder.decode(bytes.slice(offset, offset + questionIdLength));
                  offset += questionIdLength;
                }
                payload.question = { id: questionId, answerType };
              }
            }

            if ((flags & 2) && offset < bytes.length) {
              payload.identifyDisplayEnabled = Boolean(bytes[offset++]);
            }

            if ((flags & 4) && offset + 2 <= bytes.length) {
              payload.identifyNumber = readUInt16LE(bytes, offset);
            }

            return payload;
          }

          if (type === CTRL.SUBMIT_REQUEST) {
            return { type: 'submit-request' };
          }

          if (type === CTRL.IDENTIFY_DISPLAY) {
            return {
              type: 'identify-display',
              enabled: bytes.length >= 2 ? Boolean(bytes[1]) : false,
              identifyNumber: bytes.length >= 4 ? readUInt16LE(bytes, 2) : null,
            };
          }

          if (type === CTRL.FINAL_STATS) {
            return { type: 'final-stats' };
          }

          if (type === CTRL.FW_UPDATE) {
            let offset = 1;
            const urlLength = offset < bytes.length ? bytes[offset++] : 0;
            let url = '';
            if (urlLength > 0 && offset + urlLength <= bytes.length) {
              url = textDecoder.decode(bytes.slice(offset, offset + urlLength));
              offset += urlLength;
            }
            return {
              type: 'fw-update',
              url,
              sha256: offset + 32 <= bytes.length ? bytesToHex(bytes.slice(offset, offset + 32)) : null,
            };
          }

          return null;
        }

        function decodeResultPayload(message) {
          const bytes = normalizeBytes(message);
          if (bytes.length < 4 || bytes[0] !== MSG.RESULT) return null;
          return {
            type: 'result',
            correct: Boolean(bytes[1] & 1),
            totalPoints: readUInt16LE(bytes, 2),
          };
        }

        function publishBinary(topic, payload, options) {
          if (!client || !client.connected) return false;
          try {
            client.publish(topic, payload, options);
            return true;
          } catch (e) {
            return false;
          }
        }

        function connect() {
          if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
          clearTelemetryTimer();
          if (client) {
            try {
              client.removeAllListeners();
              client.end(true);
            } catch (e) {}
            client = null;
          }

          gpId = getOrCreateId();
          const url = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + WS_PATH;
          try {
            client = mqtt.connect(url, { clientId: gpId, clean: true, reconnectPeriod: 0 });
          } catch (e) { scheduleReconnect(); return; }

          client.on('connect', () => {
            try { client.subscribe(`gamepad/${gpId}/control`, { qos: 1 }); } catch (e) {}
            try { client.subscribe(`gamepad/${gpId}/result`, { qos: 1 }); } catch (e) {}
            try { publishTelemetry(); } catch (e) {}
            clearTelemetryTimer();
            telemetryTimer = setInterval(publishTelemetry, 5000);
            if (currentPhase !== 'voting') setLedColor(0,0,0);
          });

          client.on('message', (topic, msg) => {
            try {
              const parts = String(topic || '').split('/');
              const kind = parts[2];
              if (kind === 'control') {
                const payload = decodeControlPayload(msg);
                if (payload) handleControl(payload);
              }
              if (kind === 'result') {
                const payload = decodeResultPayload(msg);
                if (payload) handleResult(payload);
              }
            } catch (e) {}
          });

          client.on('error', () => {});

          client.on('close', () => {
            clearTelemetryTimer();
            setLedColor(255,0,0);
            setDisplay(100);
            scheduleReconnect();
          });
        }

        function scheduleReconnect() {
          if (reconnectTimer) return;
          reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, 1500);
        }

        function publishTelemetry() {
          if (!client || !gpId || !client.connected) return;
          const rssi = -40 - Math.floor(Math.random() * 30);
          publishBinary(`gamepad/${gpId}/telemetry`, encodeTelemetry(rssi, 100), { qos: 0 });
        }

        function publishTelemetryStatus(statusType, status, detail) {
          if (!client || !gpId || !client.connected) return;
          publishBinary(`gamepad/${gpId}/telemetry`, encodeTelemetryStatus(statusType, status, detail), { qos: 0 });
        }

        function publishSubmit() {
          if (!client || !gpId || !client.connected) return;
          try {
            endMs = nowMs();
            publishBinary(
              `gamepad/${gpId}/submit`,
              encodeSubmitPayload(
                selection,
                {
                  startMs: Number.isFinite(Number(startMs)) ? Number(startMs) : null,
                  choiceMs: Number.isFinite(Number(choiceMs)) ? Number(choiceMs) : null,
                  endMs: Number.isFinite(Number(endMs)) ? Number(endMs) : null,
                },
                currentQuestion && currentQuestion.answerType ? currentQuestion.answerType : 'single'
              ),
              { qos: 1 }
            );
          } catch (e) {}
        }

        function handleControl(payload) {
          const type = (payload && payload.type) ? String(payload.type).toLowerCase() : '';
          if (type === 'fw-update') {
            publishTelemetryStatus('fw-update-status', 'error', 'unsupported-browser');
            return;
          }

          if (type === 'phase') {
            const phase = String(payload.phase || 'idle');
            currentPhase = phase;

            if ('identifyDisplayEnabled' in payload) identifyDisplayEnabled = Boolean(payload.identifyDisplayEnabled);
            if ('identifyNumber' in payload) {
              const n = Number(payload.identifyNumber);
              identifyNumber = Number.isFinite(n) && n > 0 ? n : null;
            }

            if (payload.question && typeof payload.question === 'object') {
              currentQuestion = payload.question;
            } else {
              currentQuestion = null;
            }

            if (phase === 'voting') {
              selection = [];
              renderSelectionDisplay();
              startMs = nowMs();
              choiceMs = null;
              endMs = null;
              setLedColor(0,0,255);
            } else if (phase === 'collecting') {
              setLedColor(0,0,0);
              if (identifyDisplayEnabled) {
                if (identifyNumber != null) setDisplay(Number(identifyNumber)); else setDisplay('--');
              } else {
                if (hasVote()) renderSelectionDisplay(); else setDisplay('--');
              }
            } else if (phase === 'question' || phase === 'welcome' || phase === 'idle') {
              selection = [];
              setLedColor(0,0,0);
              if (identifyDisplayEnabled) {
                if (identifyNumber != null) setDisplay(Number(identifyNumber)); else setDisplay('--');
              } else {
                setDisplay('--');
              }
            } else if (phase === 'review' || phase === 'reveal') {
              if (identifyDisplayEnabled) {
                if (identifyNumber != null) setDisplay(Number(identifyNumber));
              }
            } else if (phase === 'finished') {
              setLedColor(0,0,0);
              if (identifyDisplayEnabled) {
                if (identifyNumber != null) setDisplay(Number(identifyNumber));
              }
            }

            return;
          }

          if (type === 'submit-request') {
            publishSubmit();
            setLedColor(0,0,0);
            return;
          }

          if (type === 'final-stats') {
            setLedColor(0,0,0);
            return;
          }

          if (type === 'identify-display') {
            identifyDisplayEnabled = Boolean(payload.enabled);
            if ('identifyNumber' in payload) {
              const n = Number(payload.identifyNumber);
              identifyNumber = Number.isFinite(n) && n > 0 ? n : null;
            }

            if (currentPhase !== 'voting') {
              if (identifyDisplayEnabled) {
                if (identifyNumber != null) setDisplay(Number(identifyNumber)); else setDisplay('--');
              } else {
                if (currentPhase === 'collecting') {
                  if (hasVote()) renderSelectionDisplay(); else setDisplay('--');
                } else {
                  setDisplay('--');
                }
              }
            }
            return;
          }
        }

        function handleResult(payload) {
          if (!payload) return;
          if (payload.correct) setLedColor(0,255,0);
          else setLedColor(255,0,0);

          if (identifyDisplayEnabled && currentPhase !== 'voting') {
            if (identifyNumber != null) setDisplay(Number(identifyNumber));
          } else {
            setDisplay(Number(payload.totalPoints || 0));
          }
        }

        function hasVote() { return Array.isArray(selection) && selection.length > 0; }
        function renderSelectionDisplay() {
          if (!hasVote()) {
            setDisplay('--');
            return;
          }
          setDisplay(selection.join(''));
          if (currentPhase === 'voting') setLedColor(0,0,255);
        }

        // button wiring
        document.getElementById('btnA').addEventListener('click', () => { applyButton('A'); });
        document.getElementById('btnB').addEventListener('click', () => { applyButton('B'); });
        document.getElementById('btnC').addEventListener('click', () => { applyButton('C'); });
        document.getElementById('btnD').addEventListener('click', () => { applyButton('D'); });
        document.getElementById('btnR').addEventListener('click', () => { applyButton('R'); });

        function applyButton(button) {
          if (currentPhase !== 'voting') return;
          const prevSel = Array.isArray(selection) ? selection.slice() : [];

          if (button === 'R') {
            if (hasVote()) {
              selection = [];
              renderSelectionDisplay();
            }
            return;
          }

          if (!['A','B','C','D'].includes(button)) return;
          const type = currentQuestion && currentQuestion.answerType ? currentQuestion.answerType : 'single';

          if (type === 'single') {
            if (hasVote()) return;
            selection = [button];
          } else if (type === 'multiple') {
            if (!selection.includes(button)) {
              selection = [...selection, button].sort();
            }
          } else {
            if (selection.includes(button)) return;
            if (selection.length >= 4) return;
            selection = [...selection, button];
          }

          try {
            const prevStr = prevSel.join('|');
            const newStr = (selection || []).join('|');
            if (prevStr !== newStr && selection.length > 0) {
              choiceMs = nowMs();
            }
          } catch (e) {}

          renderSelectionDisplay();
        }

        setLedColor(255,0,0);
        setDisplay(100);
        try { connect(); } catch (e) { scheduleReconnect(); }
      </script>
    </div>
  </body>
</html>
